# BioMek Simulation Configuration
# Muscle parameters from arm26.osim (Holzbaur et al. 2005 / Thelen 2003)
# https://github.com/opensim-org/opensim-models/tree/master/Models/Arm26

simulation:
  f_cable_lbs: 11        # Cable force displayed to user (lbs)
  n_rom_points: 60

output:
  dpi: 150

# ── Segment geometry (meters, from arm26 model) ───────────────
segments:
  upper_arm_length: 0.2817    # r_humerus: shoulder to elbow
  forearm_length: 0.2534      # r_ulna_radius_hand to wrist
  hand_grip_center: 0.05      # wrist to mid-palm

device:
  pad_from_wrist: 0.02        # BioMek pad: 2 cm proximal to wrist
  grip_force_fraction: 0.05   # 5% of cable load for stabilization

# ── Joint stress reference areas (m²) ────────────────────────
joint_ref_areas:
  wrist: 0.0006      # ~6 cm²
  elbow: 0.0012      # ~12 cm²
  shoulder: 0.0020   # ~20 cm²

# ── Elbow muscles — exact values from arm26.osim ─────────────
# Thelen2003Muscle parameters (Holzbaur et al. 2005)
elbow_muscles:
  BIClong:
    full_name: "Biceps Long Head"
    max_isometric_force: 624.3
    optimal_fiber_length: 0.1157
    tendon_slack_length: 0.2723
    pennation_angle: 0.0
    role: flexor
  BICshort:
    full_name: "Biceps Short Head"
    max_isometric_force: 435.56
    optimal_fiber_length: 0.1321
    tendon_slack_length: 0.1923
    pennation_angle: 0.0
    role: flexor
  BRA:
    full_name: "Brachialis"
    max_isometric_force: 987.26
    optimal_fiber_length: 0.0858
    tendon_slack_length: 0.0535
    pennation_angle: 0.0
    role: flexor
  TRIlong:
    full_name: "Triceps Long Head"
    max_isometric_force: 798.52
    optimal_fiber_length: 0.1340
    tendon_slack_length: 0.1430
    pennation_angle: 0.2094
    role: extensor
  TRIlat:
    full_name: "Triceps Lateral Head"
    max_isometric_force: 624.3
    optimal_fiber_length: 0.1138
    tendon_slack_length: 0.0980
    pennation_angle: 0.1571
    role: extensor
  TRImed:
    full_name: "Triceps Medial Head"
